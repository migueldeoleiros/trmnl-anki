services:
  backend:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TRMNL_ANKI_ANKICONNECT_URL: http://anki:8765
      TRMNL_ANKI_CACHE_PATH: /data/cache/current-card.json
      TRMNL_ANKI_DECK_NAME: ${TRMNL_ANKI_DECK_NAME:-Core 2000}
      TRMNL_ANKI_CARD_QUERY: ${TRMNL_ANKI_CARD_QUERY:-rated:7 deck:"Core 2000"}
      TRMNL_ANKI_FALLBACK_QUERY: ${TRMNL_ANKI_FALLBACK_QUERY:-deck:"Core 2000"}
      TRMNL_ANKI_CADENCE_MINUTES: ${TRMNL_ANKI_CADENCE_MINUTES:-30}
      TRMNL_ANKI_SYNC_INTERVAL_SECONDS: ${TRMNL_ANKI_SYNC_INTERVAL_SECONDS:-3600}
      TRMNL_ANKI_BACKGROUND_SYNC_ENABLED: ${TRMNL_ANKI_BACKGROUND_SYNC_ENABLED:-true}
      TRMNL_ANKI_REFRESH_ON_STARTUP: ${TRMNL_ANKI_REFRESH_ON_STARTUP:-true}
      TRMNL_ANKI_EXPOSE_API_DOCS: ${TRMNL_ANKI_EXPOSE_API_DOCS:-false}
    volumes:
      - trmnl_anki_cache:/data/cache
    networks:
      - public
      - internal
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    depends_on:
      - anki

  anki:
    image: ghcr.io/linuxserver/baseimage-kasmvnc:debianbookworm
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      TZ: ${TZ:-UTC}
      ANKIWEB_EMAIL: ${ANKIWEB_EMAIL:-}
      ANKI_SYNC_INTERVAL_SECONDS: ${TRMNL_ANKI_SYNC_INTERVAL_SECONDS:-3600}
    volumes:
      - anki_profile:/config
      - ./scripts:/opt/trmnl-anki:ro
    networks:
      - internal
    expose:
      - "8765"
      - "3000"
    # Portainer note: publish noVNC/KasmVNC only behind admin-only auth.
    # Example for first bootstrap on localhost only:
    # ports:
    #   - "127.0.0.1:3000:3000"
    command: ["/opt/trmnl-anki/anki-bootstrap-placeholder.sh"]

networks:
  public:
  internal:
    internal: true

volumes:
  trmnl_anki_cache:
  anki_profile:
